---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 3
  - package-ecosystem: npm
    directory: /
    groups:
      tailwindcss:
        patterns:
          - "@tailwindcss/*"
          - tailwindcss
    schedule:
      interval: daily
    cooldown:
      default-days: 3
